# render.yaml — Blueprint for the maintenance CRON JOBS (catalog-sync +
# BPM/Key analyzer). Does NOT define the web services or Postgres (those stay
# dashboard-managed) — only the crons, so Render won't take them over.
#
# Your web services (Service A = madmusic.onrender.com, Service B =
# musicafricadirect.com) and the Postgres instance are dashboard-managed; this
# file intentionally defines ONLY the cron so it can live as infra-as-code
# without Render trying to take over those services. Secrets use `sync: false`
# (set them in the dashboard or an Environment Group — never commit them).
# See docs/postgres-mirror.md.
services:
  - type: cron
    name: madmusic-catalog-sync
    runtime: node
    plan: starter
    region: frankfurt          # matches the Postgres instance (Frankfurt)
    branch: live               # ⚠️ the branch Service B + this cron deploy from
    schedule: "0 1 * * *"      # 01:00 UTC = 03:00 SAST — nightly, low traffic
    buildCommand: npm install
    startCommand: npm run sync:catalog
    envVars:
      # Internal Postgres URL (same region → private networking).
      - key: DATABASE_URL
        sync: false
      # FileMaker (fmcloud) Data API creds — same values as the web service.
      - key: FM_HOST
        sync: false
      - key: FM_DB
        sync: false
      - key: FM_USER
        sync: false
      - key: FM_PASS
        sync: false
      # Records per FM page (optional; default 500).
      - key: SYNC_PAGE_SIZE
        value: "500"
    # Tip: instead of the five sync:false vars above, create a Render
    # Environment Group with DATABASE_URL + FM_* and link it here and to
    # Service B via:   envVarGroups: [ madmusic-shared ]

  # ── BPM/Key analyzer (Docker — Essentia needs ffmpeg) ──────────────────────
  # Finds FileMaker records with empty AI_BPM, analyses the S3 audio with
  # Essentia, writes AI_BPM/AI_Key/AI_Mood/AI_Energy back to FileMaker. Postgres
  # picks the values up on the next catalog-sync. ONE runner only — don't also
  # schedule it on a desktop. ~1 GB RAM for MusicExtractor → standard plan.
  - type: cron
    name: madmusic-bpm-analyzer
    runtime: docker
    plan: standard
    region: frankfurt
    branch: live
    schedule: "0 0 * * *"      # 00:00 UTC = 02:00 SAST (before the catalog sync)
    dockerfilePath: ./scripts/analyzer/Dockerfile
    dockerContext: ./scripts/analyzer
    envVars:
      - key: FM_HOST          # MUST include https:// (e.g. https://digitalcupboard.fmcloud.fm)
        sync: false
      - key: FM_DB
        sync: false
      - key: FM_USER
        sync: false
      - key: FM_PASS
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: eu-north-1

  # ── Similar-albums index rebuild (Docker — Node + embed model) ─────────────
  # Reads the catalogue (incl. AI_BPM/AI_Key) from Postgres, re-embeds changed
  # tracks (incremental), rebuilds the album index + musical features, and
  # publishes semantic.db + suggest.db to S3 — the app hot-swaps it. Runs AFTER
  # the analyzer (00:00) + catalog sync (01:00) so it sees the freshest AI data.
  - type: cron
    name: madmusic-similar-index
    runtime: docker
    plan: standard
    region: frankfurt
    branch: live
    schedule: "0 2 * * *"      # 02:00 UTC = 04:00 SAST
    dockerfilePath: ./scripts/semantic/Dockerfile
    dockerContext: .           # repo root — needs lib/ + package.json
    envVars:
      - key: DATABASE_URL      # Internal Postgres URL (catalogue + AI fields source)
        sync: false
      - key: SUGGEST_SOURCE
        value: postgres
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: eu-north-1
