# SonarQube project configuration for MASS Music
sonar.projectKey=madmusic
sonar.projectName=MASS Music
sonar.projectVersion=1.0

# Source directory (relative to this file)
sonar.sources=.

# Exclude node_modules, test files, and generated files
sonar.exclusions=node_modules/**,public/**,data/**,*.min.js,sonarqube-report.html

# Encoding
sonar.sourceEncoding=UTF-8

# Language
sonar.language=js

# SonarQube server
sonar.host.url=http://localhost:9000
